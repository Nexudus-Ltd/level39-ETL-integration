name: Nexudus ETL Report - Daily at 9am

on:
  schedule:
    # Runs every day at 9:00 AM UTC
    # Adjust the time as needed: "0 9 * * *"
    # Format: minute hour day month day-of-week
    - cron: "0 9 * * *"
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  etl-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      
      - name: Run ETL Job
        env:
          NEXUDUS_USERNAME: ${{ secrets.NEXUDUS_USERNAME }}
          NEXUDUS_PASSWORD: ${{ secrets.NEXUDUS_PASSWORD }}
          BUSINESS_ID: ${{ secrets.NEXUDUS_BUSINESS_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          DEBUG: false
        run: python3 downloadInvoices.py
      
      - name: Notify on failure (optional)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            console.log('ETL Job failed. Check the workflow logs for details.')